name: C++ Unit Tests

on:
  pull_request:
    paths:
      - 'vector/src/main/cpp/**'
  push:
    branches: [ main, develop ]
    paths:
      - 'vector/src/main/cpp/**'
  workflow_dispatch: {}

permissions: {}

jobs:
  unit-tests:
    name: C++ unit tests (host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Build and run lemmy unit tests
        working-directory: vector/src/main/cpp
        run: |
          g++ -std=c++20 -I include \
            tests/test_lemmy.cpp src/lemmy_api.cpp \
            -o /tmp/test_lemmy
          /tmp/test_lemmy

name: Native C++ Build

on:
  pull_request:
    paths:
      - 'vector/src/main/cpp/**'
  push:
    branches: [ main, develop ]
    paths:
      - 'vector/src/main/cpp/**'
  workflow_dispatch: {}

permissions: {}

env:
  GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx2048m -Dfile.encoding=UTF-8" -Dkotlin.daemon.jvm.options="-Xmx1024m"

jobs:
  native-compile:
    name: Native NDK compile (${{ matrix.abi }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi: [ armeabi-v7a, x86_64 ]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Use JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Configure gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2
        with:
          cache-read-only: true

      - name: Compile native code (${{ matrix.abi }})
        run: |
          ./gradlew :vector:assembleDebug \
            --stacktrace --no-daemon --no-build-cache \
            -PciAbi=${{ matrix.abi }} \
            -PpreDexEnable=false \
            -PminifyEnabled=false \
            -Pandroid.enableBuildCache=false \
            -PallWarningsAsErrors=false

      - name: Verify native libraries built
        run: |
          echo "=== Built .so files ==="
          find vector/.cxx -name '*.so' -type f 2>/dev/null | while read f; do
            echo "$f ($(du -h "$f" | cut -f1))"
          done
          count=$(find vector/.cxx -name '*.so' -type f 2>/dev/null | wc -l)
          if [ "$count" -eq 0 ]; then
            echo "ERROR: No .so files found — native compilation failed"
            exit 1
          fi
          echo "Total: $count native libraries"
